services:
  # Frontend Service
  - type: web
    name: gadgetra-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://your-backend-url.onrender.com/api
    buildFilter:
      paths:
        - frontend/**
    healthCheckPath: /
    autoDeploy: true
